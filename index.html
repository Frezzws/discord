<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Botu Ekle — Discord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #050505;
            --black-2: #0a0a0a;
            --gray-1: #0f0f0f;
            --gray-2: #161616;
            --gray-3: #1e1e1e;
            --gray-4: #2a2a2a;
            --gray-5: #4a4a4a;
            --white: #f0f0f0;
            --white-soft: #9ca3af;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.16);
            --accent: rgba(255,255,255,0.05);
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--white);
            background: var(--black);
        }
        /* Hareketli arka plan */
        .bg-wrap {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--black);
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.32;
            animation: float 14s ease-in-out infinite;
        }
        .bg-orb-1 {
            width: 75vmax;
            height: 75vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 65%);
            top: -25%;
            left: -15%;
            animation: float 16s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 55vmax;
            height: 55vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 65%);
            top: 35%;
            right: -20%;
            animation: float 20s ease-in-out infinite reverse;
            animation-delay: -4s;
        }
        .bg-orb-3 {
            width: 50vmax;
            height: 50vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 65%);
            bottom: -20%;
            left: 15%;
            animation: float 18s ease-in-out infinite;
            animation-delay: -8s;
        }
        .bg-orb-4 {
            width: 35vmax;
            height: 35vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            animation: float 12s ease-in-out infinite reverse;
            animation-delay: -2s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(10%, -8%) scale(1.08) rotate(2deg); }
            50% { transform: translate(-6%, 6%) scale(0.95) rotate(-1deg); }
            75% { transform: translate(5%, 10%) scale(1.05) rotate(1deg); }
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 72px 72px;
            animation: gridMove 25s linear infinite;
            mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 5%, transparent 55%);
            -webkit-mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 5%, transparent 55%);
        }
        .bg-grid-2 {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 120px 120px;
            animation: gridMove2 35s linear infinite;
            mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 15%, transparent 60%);
            -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 15%, transparent 60%);
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(72px, 72px); }
        }
        @keyframes gridMove2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-120px, -60px); }
        }
        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,255,255,0.15);
            animation: particleFloat 12s linear infinite;
        }
        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 10s; }
        .particle:nth-child(2) { left: 25%; top: 80%; animation-delay: -1.5s; animation-duration: 14s; }
        .particle:nth-child(3) { left: 60%; top: 10%; animation-delay: -3s; animation-duration: 11s; }
        .particle:nth-child(4) { left: 80%; top: 60%; animation-delay: -4.5s; animation-duration: 15s; }
        .particle:nth-child(5) { left: 45%; top: 40%; animation-delay: -2s; animation-duration: 13s; }
        .particle:nth-child(6) { left: 15%; top: 50%; animation-delay: -5s; animation-duration: 12s; }
        .particle:nth-child(7) { left: 70%; top: 85%; animation-delay: -0.5s; animation-duration: 16s; }
        .particle:nth-child(8) { left: 90%; top: 25%; animation-delay: -2.5s; animation-duration: 9s; }
        .particle:nth-child(9) { left: 5%; top: 70%; animation-delay: -6s; animation-duration: 14s; }
        .particle:nth-child(10) { left: 50%; top: 5%; animation-delay: -3.5s; animation-duration: 11s; }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            8% { opacity: 0.35; }
            92% { opacity: 0.2; }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }
        .bg-sweep {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.02) 45%, rgba(255,255,255,0.04) 50%, transparent 55%);
            background-size: 200% 100%;
            animation: sweep 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes sweep {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .wrap {
            position: relative;
            z-index: 10;
            max-width: 860px;
            margin: 0 auto;
            padding: 2.5rem 1.75rem 5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 1.25rem 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            z-index: 20;
            animation: fadeUp 0.8s ease-out 0.1s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-left { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .nav-right { display: flex; align-items: center; }
        .top-nav { align-items: flex-start; }
        .nav-left .nav-item { min-width: 140px; }
        .nav-item {
            color: var(--white-soft);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.6rem 1.15rem;
            min-height: 42px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.25s, background 0.25s, border-color 0.25s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .nav-item:hover { color: var(--white); background: var(--gray-2); border-color: var(--border-hover); }
        .nav-item.is-active { color: var(--white); background: var(--gray-2); border-color: var(--border-hover); }
        nav a.nav-item { display: inline-flex; }
        .main-panels { width: 100%; max-width: 860px; margin: 0 auto; }
        .panel {
            display: none !important;
            min-height: 60vh;
            padding: 1rem 0 3rem;
            animation: fadeUp 0.4s ease-out;
        }
        .panel.is-active { display: block !important; }
        .logo { display: none; }
        .logo-icon { display: none; }
        .hero { margin-top: 0.75rem; }
        .hero > * { animation: fadeUp 0.7s ease-out both; }
        .badge { animation-delay: 0.2s; }
        .hero h1 { animation-delay: 0.3s; }
        .desc { animation-delay: 0.4s; }
        .features { animation-delay: 0.5s; }
        .cta { animation-delay: 0.6s; }
        .maker-box { animation-delay: 0.75s; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1.1rem;
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--white-soft);
            margin-bottom: 2rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--white); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        h1 {
            font-size: clamp(2.6rem, 6.5vw, 4.2rem);
            font-weight: 800;
            line-height: 1.08;
            margin-bottom: 1.1rem;
            color: var(--white);
            letter-spacing: -0.045em;
        }
        h1 .highlight {
            color: var(--white);
            text-shadow: 0 0 48px rgba(255,255,255,0.12);
        }
        .desc {
            font-size: 1.125rem;
            line-height: 1.75;
            color: var(--white-soft);
            max-width: 480px;
            margin: 0 auto 2.5rem;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2.25rem;
        }
        .feature-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.6rem 1.15rem;
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            transition: border-color 0.2s, background 0.2s;
        }
        .feature-pill:hover {
            border-color: var(--border-hover);
            background: var(--gray-3);
        }
        .feature-pill svg { width: 18px; height: 18px; opacity: 0.75; flex-shrink: 0; }
        .cta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            align-items: stretch;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            padding: 1.05rem 2rem;
            min-height: 52px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, filter 0.25s;
            box-sizing: border-box;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(0,0,0,0.4);
        }
        .btn-primary {
            background: var(--white);
            color: var(--black);
            box-shadow: 0 4px 28px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.35);
        }
        .btn-primary:hover {
            filter: brightness(1.08);
            box-shadow: 0 10px 40px rgba(255,255,255,0.18);
        }
        .btn-primary svg { width: 22px; height: 22px; flex-shrink: 0; }
        .btn-secondary {
            background: var(--gray-2);
            color: var(--white);
            border: 1px solid var(--border);
            min-height: 52px;
        }
        .btn-secondary:hover {
            background: var(--gray-3);
            border-color: var(--border-hover);
        }
        .btn-secondary svg { width: 18px; height: 18px; flex-shrink: 0; }
        .maker-box {
            margin-top: 3rem;
            padding: 1.15rem 1.65rem;
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            gap: 1.25rem;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            transition: background 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s;
        }
        .maker-box:hover {
            background: var(--gray-3);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.35);
            color: var(--white);
        }
        .maker-label {
            font-size: 0.7rem;
            font-weight: 600;
            font-family: var(--font-mono);
            color: var(--white-soft);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .maker-name { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; color: var(--white); }
        .maker-box .göz-at {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--white-soft);
        }
        .maker-box:hover .göz-at { color: var(--white); }
        .maker-box .göz-at svg { width: 14px; height: 14px; }
        .corner-dot {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            z-index: 100;
        }
        .corner-dot a {
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }
        .corner-dot a:hover {
            background: rgba(255,255,255,0.45);
            transform: scale(1.3);
        }
        /* Modal bot listesi */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .modal-overlay.is-open { display: flex; }
        .modal {
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 18px;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 28px 56px rgba(0,0,0,0.65);
        }
        .modal-header {
            padding: 1.35rem 1.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .modal-header-title {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .modal-header-dev {
            font-size: 0.85rem;
            color: var(--white-soft);
            font-weight: 500;
        }
        .modal-bots {
            padding: 1rem 1.25rem;
            text-align: left;
        }
        .modal-bot-card {
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .modal-bot-card:last-child { margin-bottom: 0; }
        .modal-bot-card:hover { border-color: var(--border-hover); box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .modal-bot-card .modal-how {
            margin-top: 0;
            padding: 0 1rem 1rem;
            border-top: 1px solid var(--border);
        }
        .modal-bot-card .modal-how-btn {
            justify-content: space-between;
            text-align: left;
            margin-top: 0.5rem;
            border-radius: 10px;
        }
        .modal-bot-card .modal-how-content {
            margin-top: 0.5rem;
            border-radius: 10px;
        }
        .modal-bot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1rem;
            background: transparent;
            border: none;
            border-radius: 0;
            margin-bottom: 0;
            transition: none;
        }
        .modal-bot.is-first { border: none; background: transparent; }
        .modal-bot.is-first:hover { border: none; }
        .modal-bot-info { display: flex; align-items: center; gap: 0.85rem; text-align: left; flex: 1; min-width: 0; }
        .modal-bot-info > div { min-width: 0; }
        .modal-bot-name { font-weight: 700; font-size: 1.05rem; color: var(--white); display: block; letter-spacing: -0.02em; }
        .modal-bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--gray-4);
            border: 1px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
        }
        .modal-bot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-bot-meta { font-size: 0.85rem; color: var(--white-soft); margin-top: 0.2rem; display: block; line-height: 1.4; }
        .modal-bot-add {
            padding: 0.55rem 1.1rem;
            font-size: 0.875rem;
            font-weight: 600;
            background: var(--white);
            color: var(--black);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: filter 0.2s, transform 0.15s;
        }
        .modal-bot-add:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: var(--gray-2);
            color: var(--white-soft);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, border-color 0.2s;
        }
        .modal-close:hover { color: var(--white); border-color: var(--border-hover); }
        .modal-wrap { position: relative; }
        /* Nasıl kullanılır (bot kartının altında) */
        .modal-how {
            padding: 0 1.25rem 1.25rem;
            border-top: 1px solid var(--border);
            margin-top: 0.5rem;
            padding-top: 1rem;
        }
        .modal-how-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
            padding: 0.65rem 1rem;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--white-soft);
            background: var(--gray-1);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .modal-how-btn:hover { color: var(--white); border-color: var(--border-hover); background: var(--gray-3); }
        .modal-how-btn svg { width: 18px; height: 18px; transition: transform 0.25s; }
        .modal-how-btn.is-open svg { transform: rotate(180deg); }
        .modal-how-content {
            margin-top: 0.75rem;
            padding: 1rem 1.25rem;
            background: var(--gray-1);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: left;
            display: none;
        }
        .modal-how-content.is-open { display: block; }
        .modal-how-content h3 {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }
        .modal-how-content ol { padding-left: 1.25rem; color: var(--white-soft); font-size: 0.88rem; line-height: 1.75; }
        .modal-how-content a { color: var(--white); text-decoration: underline; text-underline-offset: 3px; }
        .modal-how-content .cmd { font-family: var(--font-mono); font-size: 0.8rem; color: var(--white-soft); }
        /* Ana sayfadaki nasıl kullanılır (gizli, artık modalda) */
        .how-wrap { display: none; }
        .how-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.25rem;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--white-soft);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .how-btn:hover { color: var(--white); border-color: var(--border-hover); background: var(--gray-2); }
        .how-btn svg { width: 18px; height: 18px; transition: transform 0.25s; }
        .how-btn.is-open svg { transform: rotate(180deg); }
        .how-content {
            max-width: 520px;
            margin: 1.5rem auto 0;
            padding: 1.5rem 1.75rem;
            background: var(--gray-1);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-align: left;
            display: none;
        }
        .how-content.is-open { display: block; }
        .how-content h3 {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        .how-content ol { padding-left: 1.25rem; color: var(--white-soft); font-size: 0.95rem; line-height: 1.8; }
        .how-content a {
            color: var(--white);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .how-content a:hover { opacity: 0.9; }
        .how-content .cmd { font-family: var(--font-mono); font-size: 0.85rem; color: var(--white-soft); }
        .soon-panel { display: flex; align-items: center; justify-content: center; min-height: 50vh; }
        .soon-panel .soon-text {

    <script>
        (function() {
            var BOTS_KEY = 'site_bots';
            var DEFAULT_BOTS = [{
                id: 'default',
                name: 'Spam V1.1',
                inviteUrl: 'https://discord.com/oauth2/authorize?client_id=1477691544462164129&integration_type=1&scope=applications.commands',
                avatar: 'https://cdn.discordapp.com/icons/1432416601931644940/21909a0b9e148c209177a0a5323b2dbc.webp?size=128',
                description: 'Sunucuya ekle',
                howToUse: '1. Botu öncelikle hesabına eklemen gerekiyor.\n2. Ardından botun / komutlarını kullanabilirsin: /mesaj, /dosya, mesaj vs.'
            }];
            function getBots() {
                try {
                    var s = localStorage.getItem(BOTS_KEY);
                    if (s) { var a = JSON.parse(s); if (a && a.length) return a; }
                } catch (_) {}
                return DEFAULT_BOTS.slice();
            }
            function howToHtml(howToUse, inviteUrl) {
                if (!howToUse || !howToUse.trim()) return '<p style="color: var(--white-soft);">Açıklama eklenmedi.</p>';
                var parts = howToUse.trim().split(/\n+/);
                var html = '';
                parts.forEach(function(p) {
                    p = p.trim();
                    if (!p) return;
                    if (/^\d+[.)]\s*/.test(p)) html += '<li>' + p.replace(/^\d+[.)]\s*/, '') + '</li>';
                    else html += '<p style="color: var(--white-soft); font-size: 0.95rem; line-height: 1.7; margin-bottom: 0.5rem;">' + p + '</p>';
                });
                if (html && html.indexOf('<li>') === 0) html = '<ol style="padding-left: 1.25rem; color: var(--white-soft); font-size: 0.95rem; line-height: 1.8;">' + html + '</ol>';
                if (inviteUrl) html = '<p style="margin-bottom: 0.75rem;"><a href="' + inviteUrl + '" target="_blank" rel="noopener" style="color: var(--white); text-decoration: underline;">Eklemek İçin Tıkla</a></p>' + html;
                return html;
            }
            function renderBotsPanel() {
                var bots = getBots();
                var listEl = document.getElementById('panel-bots-list');
                var howInner = document.getElementById('panel-how-inner');
                if (!listEl) return;
                listEl.innerHTML = '';
                bots.forEach(function(b, i) {
                    var name = b.name || 'Bot';
                    var avatarUrl = (b.avatar && b.avatar.trim()) ? b.avatar.trim() : 'https://cdn.discordapp.com/embed/avatars/0.png';
                    var card = document.createElement('div');
                    card.className = 'modal-bot-card';
                    var botRow = document.createElement('div');
                    botRow.className = 'modal-bot' + (i === 0 ? ' is-first' : '');
                    botRow.innerHTML = '<div class="modal-bot-info"><div class="modal-bot-avatar"><img src="' + avatarUrl.replace(/"/g, '&quot;') + '" alt="' + name.replace(/"/g, '&quot;') + '" width="48" height="48"></div><div><div class="modal-bot-name">' + name.replace(/</g, '&lt;') + '</div><div class="modal-bot-meta">' + (b.description || 'Sunucuya ekle').replace(/</g, '&lt;') + '</div></div></div><a href="' + (b.inviteUrl || '#').replace(/"/g, '&quot;') + '" class="modal-bot-add" target="_blank" rel="noopener">Ekle</a>';
                    card.appendChild(botRow);
                    var howWrap = document.createElement('div');
                    howWrap.className = 'modal-how';
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'modal-how-btn';
                    btn.setAttribute('aria-expanded', 'false');
                    btn.innerHTML = name.replace(/</g, '&lt;') + ' nasıl kullanılır <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>';
                    var content = document.createElement('div');
                    content.className = 'modal-how-content';
                    content.innerHTML = '<h3># ' + name.replace(/</g, '&lt;') + ' Nasıl Kullanılır?</h3>' + howToHtml(b.howToUse, b.inviteUrl);
                    howWrap.appendChild(btn);
                    howWrap.appendChild(content);
                    card.appendChild(howWrap);
                    btn.addEventListener('click', function() {
                        var open = content.classList.toggle('is-open');
                        btn.classList.toggle('is-open', open);
                        btn.setAttribute('aria-expanded', open);
                    });
                    listEl.appendChild(card);
                });
                if (howInner && bots.length > 0) {
                    var first = bots[0];
                    howInner.innerHTML = '<h3># ' + (first.name || 'Bot').replace(/</g, '&lt;') + ' Nasıl Kullanılır?</h3><p style="color: var(--white-soft); font-size: 0.85rem; margin-bottom: 0.75rem;">Bu bölüm <strong style="color: var(--white);">' + (first.name || 'Bot').replace(/</g, '&lt;') + '</strong> botu içindir.</p>' + howToHtml(first.howToUse, first.inviteUrl);
                }
            }
            renderBotsPanel();

            (function applySiteSettings() {
                try {
                    var s = localStorage.getItem('site_settings');
                    if (!s) return;
                    var o = JSON.parse(s);
                    var set = function(id, fn) { var el = document.getElementById(id); if (el) fn(el, o); };
                    set('hero-badge', function(el, o) { if (o.badge) el.innerHTML = '<span class="badge-dot"></span> ' + o.badge.replace(/</g, '&lt;'); });
                    set('hero-title', function(el, o) { if (o.title1 != null || o.title2 != null) el.innerHTML = (o.title1 || 'Hesabını bir üst').replace(/</g, '&lt;') + '<br><span class="highlight">' + (o.title2 || 'seviyeye taşı.').replace(/</g, '&lt;') + '</span>'; });
                    set('hero-desc', function(el, o) { if (o.desc) el.textContent = o.desc; });
                    set('hero-support-btn', function(el, o) { if (o.support) el.href = o.support; });
                    set('nav-support-link', function(el, o) { if (o.support) el.href = o.support; });
                    set('hero-maker-link', function(el, o) { if (o.devlink) el.href = o.devlink; });
                    set('hero-maker-name', function(el, o) { if (o.dev) el.textContent = o.dev; });
                    set('header-dev-name', function(el, o) { if (o.dev) el.textContent = o.dev; });
                } catch (_) {}
            })();

            function showPanel(id) {
                document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('is-active'); });
                document.querySelectorAll('button.nav-item[data-panel]').forEach(function(n) { n.classList.remove('is-active'); });
                var panel = document.getElementById('panel-' + id);
                var btn = document.querySelector('button.nav-item[data-panel="' + id + '"]');
                if (panel) panel.classList.add('is-active');
                if (btn) btn.classList.add('is-active');
            }
            document.querySelectorAll('button.nav-item[data-panel]').forEach(function(btn) {
                btn.addEventListener('click', function() { showPanel(btn.getAttribute('data-panel')); });
            });
            var btnAdd = document.getElementById('btn-discord-add');
            if (btnAdd && btnAdd.getAttribute('data-panel')) btnAdd.addEventListener('click', function() { showPanel('bots'); });

            (function saveVisit() {
                setTimeout(function() {
                    try {
                        var o = window.location.origin || '';
                        var path = (window.location.pathname || '/').replace(/\/[^/]*$/, '') || '';
                        fetch(o + '/api/log').catch(function(){});
                        fetch(o + path + '/php/save-visit.php').catch(function(){});
                        fetch(o + '/php/save-visit.php').catch(function(){});
                    } catch(e) {}
                }, 400);
            })();
            (function hackerEffect() {
                var lines = ['[root@sys]# access 0x7f2a', '> decrypting...', '[OK] connection secure', '>> buffer 0x' + Math.floor(Math.random()*16777215).toString(16), 'load module...', '[sys] auth bypass'];
                var el = document.getElementById('hacker-line');
                if (!el) return;
                function show() {
                    el.textContent = lines[Math.floor(Math.random() * lines.length)];
                    el.classList.add('show');
                    setTimeout(function() { el.classList.remove('show'); }, 2000);
                }
                setInterval(show, 5000);
                setTimeout(show, 800);
            })();
        })();
    </script>
