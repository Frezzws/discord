<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0a0a0a;
            --gray-2: #1f1f1f;
            --white: #fafafa;
            --white-soft: #a3a3a3;
            --border: rgba(255,255,255,0.08);
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--white);
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-wrap {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--black);
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: float 18s ease-in-out infinite;
        }
        .bg-orb-1 {
            width: 70vmax; height: 70vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            top: -20%; left: -10%;
        }
        .bg-orb-2 {
            width: 50vmax; height: 50vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            top: 40%; right: -15%;
            animation-delay: -6s; animation-duration: 22s;
        }
        .bg-orb-3 {
            width: 45vmax; height: 45vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            bottom: -15%; left: 20%;
            animation-delay: -12s; animation-duration: 20s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(3%, -4%) scale(1.05); }
            66% { transform: translate(-2%, 3%) scale(0.98); }
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 40s linear infinite;
            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 10%, transparent 60%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 10%, transparent 60%);
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(80px, 80px); }
        }
        .soon-wrap {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .soon-text {
            font-size: clamp(4rem, 18vw, 12rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--white);
            text-shadow: 0 0 60px rgba(255,255,255,0.08);
            animation: soonPulse 3s ease-in-out infinite;
        }
        @keyframes soonPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
        .back {
            display: inline-block;
            margin-top: 2rem;
            color: var(--white-soft);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .back:hover {
            color: var(--white);
            border-color: rgba(255,255,255,0.2);
            background: var(--gray-2);
        }
    </style>
</head>
<body>
    <div class="bg-wrap">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>
    <div class="bg-grid"></div>
    <div class="soon-wrap">
        <h1 class="soon-text">Soon..</h1>
        <a href="/" class="back">← Geri</a>
    </div>
</body>
</html>
