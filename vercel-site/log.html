<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #08080c;
            color: #e4e4e7;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .page { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 1.5rem; color: #fff; }
        .auth { margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; }
        .auth input {
            padding: 0.65rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 10px;
            width: 240px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .auth input::placeholder { color: rgba(255,255,255,0.4); }
        .auth input:focus { outline: none; border-color: #5865f2; }
        .auth button {
            padding: 0.65rem 1.25rem;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .auth button:hover { background: #4752c4; }
        .error { color: #f87171; margin-top: 0.25rem; font-size: 0.9rem; }
        .list { display: flex; flex-direction: column; gap: 0.5rem; }
        .row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .row:hover { background: rgba(255,255,255,0.06); }
        .row-ip {
            font-weight: 600;
            color: #22d3ee;
            font-family: ui-monospace, monospace;
            min-width: 120px;
        }
        .row-time { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
        .row-type {
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .row-type.visit { background: rgba(34, 211, 238, 0.15); color: #22d3ee; }
        .row-type.click { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .row-ua { color: rgba(255,255,255,0.45); font-size: 0.8rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .empty-state { padding: 2.5rem; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; }
        .empty-title { color: rgba(255,255,255,0.5); font-weight: 600; margin-bottom: 0.5rem; }
        .empty-hint { color: rgba(255,255,255,0.4); font-size: 0.85rem; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="page">
        <h1>Giriş</h1>
        <div class="auth">
            <input type="password" id="key" placeholder="Anahtar" autocomplete="off">
            <button type="button" id="btn">Gir</button>
            <div class="error" id="err"></div>
        </div>
        <div id="content"></div>
    </div>
    <script>
        var keyInp = document.getElementById('key');
        var btn = document.getElementById('btn');
        var err = document.getElementById('err');
        var content = document.getElementById('content');
        function formatTime(iso) {
            if (!iso) return '-';
            var d = new Date(iso);
            return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        }
        function load() {
            var k = keyInp.value.trim();
            if (!k) { err.textContent = 'Anahtar girin.'; return; }
            err.textContent = '';
            content.innerHTML = '';
            fetch('/api/logs?key=' + encodeURIComponent(k))
                .then(function(r) {
                    if (!r.ok) throw new Error('Yetkisiz');
                    return r.json();
                })
                .then(function(logs) {
                    if (logs.length === 0) {
                        content.innerHTML = '<div class="empty-state"><p class="empty-title">Kayıt yok</p><p class="empty-hint">Ziyaret ve tıklamalar burada listelenir. Redis bağlı değilse Vercel → Storage → Redis bağlayıp Redeploy yap.</p></div>';
                        return;
                    }
                    var html = '<div class="list">';
                    logs.forEach(function(l) {
                        var typeClass = l.type === 'click' ? 'click' : 'visit';
                        var ua = (l.userAgent || '').slice(0, 50);
                        if ((l.userAgent || '').length > 50) ua += '…';
                        html += '<div class="row">';
                        html += '<span class="row-ip">' + (l.ip || '-') + '</span>';
                        html += '<span class="row-time">' + formatTime(l.time) + '</span>';
                        html += '<span class="row-type ' + typeClass + '">' + (l.type || '-') + '</span>';
                        html += '<span class="row-ua" title="' + (l.userAgent || '').replace(/"/g, '&quot;') + '">' + (ua || '-') + '</span>';
                        html += '</div>';
                    });
                    html += '</div>';
                    content.innerHTML = html;
                })
                .catch(function() {
                    err.textContent = 'Yetkisiz veya hata.';
                    content.innerHTML = '';
                });
        }
        btn.addEventListener('click', load);
        keyInp.addEventListener('keydown', function(e) { if (e.key === 'Enter') load(); });
    </script>
</body>
</html>
