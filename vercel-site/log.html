<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: #050508;
            color: #e0e0e0;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .page {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #fff;
        }
        .auth {
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
        }
        .auth input {
            padding: 0.65rem 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            border-radius: 10px;
            width: 260px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .auth input::placeholder { color: rgba(255,255,255,0.4); }
        .auth input:focus {
            outline: none;
            border-color: #5865f2;
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }
        .auth button {
            padding: 0.65rem 1.25rem;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.2s;
        }
        .auth button:hover {
            background: #4752c4;
            transform: translateY(-1px);
        }
        .error { color: #f87171; margin-top: 0.25rem; font-size: 0.9rem; }
        .content-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
        th {
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .type-visit { color: #7dd3fc; font-weight: 500; }
        .type-click { color: #86efac; font-weight: 500; }
        .empty-state {
            margin-top: 0;
            padding: 2rem;
            text-align: center;
        }
        .empty-title { color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 0.75rem; font-size: 1.1rem; }
        .empty-hint { color: rgba(255,255,255,0.45); font-size: 0.9rem; line-height: 1.6; max-width: 380px; margin: 0 auto; }
        .empty-hint strong { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div class="page">
        <h1>Giriş</h1>
        <div class="auth">
            <input type="password" id="key" placeholder="Anahtar" autocomplete="off">
            <button type="button" id="btn">Gir</button>
            <div class="error" id="err"></div>
        </div>
        <div id="content"></div>
    </div>
    <script>
        var keyInp = document.getElementById('key');
        var btn = document.getElementById('btn');
        var err = document.getElementById('err');
        var content = document.getElementById('content');
        function load() {
            var k = keyInp.value.trim();
            if (!k) { err.textContent = 'Anahtar girin.'; return; }
            err.textContent = '';
            content.innerHTML = '';
            fetch('/api/logs?key=' + encodeURIComponent(k))
                .then(function(r) {
                    if (!r.ok) throw new Error('Yetkisiz');
                    return r.json();
                })
                .then(function(logs) {
                    if (logs.length === 0) {
                        content.innerHTML = '<div class="content-box empty-state"><p class="empty-title">Kayıt yok</p><p class="empty-hint">Henüz veri yok. Vercel’de Redis bağlı değilse bağlayıp Redeploy yap.</p></div>';
                        return;
                    }
                    var html = '<div class="content-box"><table><thead><tr><th>Tarih</th><th>Tip</th><th>IP</th><th>Discord</th><th>Tarayıcı</th></tr></thead><tbody>';
                    logs.forEach(function(l) {
                        var cls = l.type === 'click' ? 'type-click' : 'type-visit';
                        html += '<tr><td>' + (l.time || '-') + '</td><td class="' + cls + '">' + (l.type || '-') + '</td><td>' + (l.ip || '-') + '</td><td>' + (l.discord || '-') + '</td><td>' + (l.userAgent ? l.userAgent.slice(0,55) + (l.userAgent.length > 55 ? '…' : '') : '-') + '</td></tr>';
                    });
                    html += '</tbody></table></div>';
                    content.innerHTML = html;
                })
                .catch(function() {
                    err.textContent = 'Yetkisiz veya hata.';
                    content.innerHTML = '';
                });
        }
        btn.addEventListener('click', load);
        keyInp.addEventListener('keydown', function(e) { if (e.key === 'Enter') load(); });
    </script>
</body>
</html>
