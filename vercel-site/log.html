<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0a0a0a;
            --gray-2: #1f1f1f;
            --white: #fafafa;
            --white-soft: #a3a3a3;
            --border: rgba(255,255,255,0.08);
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--white);
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-wrap {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--black);
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }
        .bg-orb-1 {
            width: 75vmax; height: 75vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, transparent 65%);
            top: -25%; left: -15%;
            animation: float 16s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 55vmax; height: 55vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 65%);
            top: 35%; right: -20%;
            animation: float 20s ease-in-out infinite reverse;
            animation-delay: -4s;
        }
        .bg-orb-3 {
            width: 50vmax; height: 50vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 65%);
            bottom: -20%; left: 15%;
            animation: float 18s ease-in-out infinite;
            animation-delay: -8s;
        }
        .bg-orb-4 {
            width: 35vmax; height: 35vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            top: 50%; left: 50%;
            animation: float 12s ease-in-out infinite reverse;
            animation-delay: -2s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(10%, -8%) scale(1.08) rotate(2deg); }
            50% { transform: translate(-6%, 6%) scale(0.95) rotate(-1deg); }
            75% { transform: translate(5%, 10%) scale(1.05) rotate(1deg); }
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 72px 72px;
            animation: gridMove 25s linear infinite;
            mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 5%, transparent 55%);
            -webkit-mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 5%, transparent 55%);
        }
        .bg-grid-2 {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 120px 120px;
            animation: gridMove2 35s linear infinite;
            mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 15%, transparent 60%);
            -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 15%, transparent 60%);
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(72px, 72px); }
        }
        @keyframes gridMove2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-120px, -60px); }
        }
        .bg-sweep {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.02) 45%, rgba(255,255,255,0.04) 50%, transparent 55%);
            background-size: 200% 100%;
            animation: sweep 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes sweep {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .soon-wrap {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .soon-text {
            font-size: clamp(4rem, 18vw, 12rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--white);
            text-shadow: 0 0 60px rgba(255,255,255,0.08);
            animation: soonPulse 3s ease-in-out infinite;
        }
        @keyframes soonPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
        .back {
            display: inline-block;
            margin-top: 2rem;
            color: var(--white-soft);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .back:hover {
            color: var(--white);
            border-color: rgba(255,255,255,0.2);
            background: var(--gray-2);
        }
    </style>
</head>
<body>
    <div class="bg-wrap">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-orb bg-orb-4"></div>
    </div>
    <div class="bg-grid"></div>
    <div class="bg-grid-2"></div>
    <div class="bg-sweep"></div>
    <div class="soon-wrap">
        <h1 class="soon-text">Soon..</h1>
        <a href="/" class="back">← Geri</a>
    </div>
</body>
</html>
