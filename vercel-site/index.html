<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botu Ekle — Discord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0a0a0a;
            --gray-1: #141414;
            --gray-2: #1f1f1f;
            --gray-3: #2d2d2d;
            --gray-4: #525252;
            --gray-5: #737373;
            --white: #fafafa;
            --white-soft: #a3a3a3;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.14);
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--white);
            background: var(--black);
        }
        /* Hareketli arka plan */
        .bg-wrap {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--black);
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: float 18s ease-in-out infinite;
        }
        .bg-orb-1 {
            width: 70vmax;
            height: 70vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            top: -20%;
            left: -10%;
            animation-delay: 0s;
        }
        .bg-orb-2 {
            width: 50vmax;
            height: 50vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            top: 40%;
            right: -15%;
            animation-delay: -6s;
            animation-duration: 22s;
        }
        .bg-orb-3 {
            width: 45vmax;
            height: 45vmax;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            bottom: -15%;
            left: 20%;
            animation-delay: -12s;
            animation-duration: 20s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(3%, -4%) scale(1.05); }
            66% { transform: translate(-2%, 3%) scale(0.98); }
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 40s linear infinite;
            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 10%, transparent 60%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 10%, transparent 60%);
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(80px, 80px); }
        }
        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
        }
        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 12s; }
        .particle:nth-child(2) { left: 25%; top: 80%; animation-delay: -2s; animation-duration: 18s; }
        .particle:nth-child(3) { left: 60%; top: 10%; animation-delay: -4s; animation-duration: 14s; }
        .particle:nth-child(4) { left: 80%; top: 60%; animation-delay: -6s; animation-duration: 16s; }
        .particle:nth-child(5) { left: 45%; top: 40%; animation-delay: -8s; animation-duration: 20s; }
        .particle:nth-child(6) { left: 15%; top: 50%; animation-delay: -3s; animation-duration: 13s; }
        .particle:nth-child(7) { left: 70%; top: 85%; animation-delay: -5s; animation-duration: 17s; }
        .particle:nth-child(8) { left: 90%; top: 25%; animation-delay: -7s; animation-duration: 11s; }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .wrap {
            position: relative;
            z-index: 10;
            max-width: 860px;
            margin: 0 auto;
            padding: 2.5rem 1.75rem 5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.75rem 2rem;
            max-width: 860px;
            margin: 0 auto;
            animation: fadeUp 0.8s ease-out 0.1s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--white);
            text-decoration: none;
            letter-spacing: -0.035em;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(145deg, var(--gray-4) 0%, var(--gray-3) 100%);
            box-shadow: 0 0 28px rgba(255,255,255,0.06), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        nav a {
            color: var(--white-soft);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.6rem 1.25rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            transition: color 0.25s, background 0.25s, border-color 0.25s;
        }
        nav a:hover { color: var(--white); background: var(--gray-2); border-color: var(--border-hover); }
        .hero { margin-top: 0.75rem; }
        .hero > * { animation: fadeUp 0.7s ease-out both; }
        .badge { animation-delay: 0.2s; }
        .hero h1 { animation-delay: 0.3s; }
        .desc { animation-delay: 0.4s; }
        .features { animation-delay: 0.5s; }
        .cta { animation-delay: 0.6s; }
        .maker-box { animation-delay: 0.75s; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1.1rem;
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--white-soft);
            margin-bottom: 2rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--white); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        h1 {
            font-size: clamp(2.6rem, 6.5vw, 4.2rem);
            font-weight: 800;
            line-height: 1.08;
            margin-bottom: 1.1rem;
            color: var(--white);
            letter-spacing: -0.045em;
        }
        h1 .highlight {
            color: var(--white);
            text-shadow: 0 0 48px rgba(255,255,255,0.12);
        }
        .desc {
            font-size: 1.125rem;
            line-height: 1.75;
            color: var(--white-soft);
            max-width: 480px;
            margin: 0 auto 2.5rem;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2.25rem;
        }
        .feature-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.6rem 1.15rem;
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            transition: border-color 0.2s, background 0.2s;
        }
        .feature-pill:hover {
            border-color: var(--border-hover);
            background: var(--gray-3);
        }
        .feature-pill svg { width: 18px; height: 18px; opacity: 0.75; flex-shrink: 0; }
        .cta { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; align-items: center; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            padding: 1.05rem 2rem;
            font-family: inherit;
            font-size: 1.02rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, filter 0.25s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(0,0,0,0.4);
        }
        .btn-primary {
            background: var(--white);
            color: var(--black);
            box-shadow: 0 4px 28px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.35);
        }
        .btn-primary:hover {
            filter: brightness(1.08);
            box-shadow: 0 10px 40px rgba(255,255,255,0.18);
        }
        .btn-primary svg { width: 22px; height: 22px; }
        .btn-secondary {
            background: var(--gray-2);
            color: var(--white);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--gray-3);
            border-color: var(--border-hover);
        }
        .btn-secondary svg { width: 18px; height: 18px; }
        .maker-box {
            margin-top: 3rem;
            padding: 1.15rem 1.65rem;
            background: var(--gray-2);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            gap: 1.25rem;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            transition: background 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s;
        }
        .maker-box:hover {
            background: var(--gray-3);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.35);
            color: var(--white);
        }
        .maker-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--white-soft);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .maker-name { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; color: var(--white); }
        .maker-box .göz-at {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--white-soft);
        }
        .maker-box:hover .göz-at { color: var(--white); }
        .maker-box .göz-at svg { width: 14px; height: 14px; }
        .corner-dot {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            z-index: 100;
        }
        .corner-dot a {
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }
        .corner-dot a:hover {
            background: rgba(255,255,255,0.45);
            transform: scale(1.3);
        }
    </style>
</head>
<body>

</body>
</html>
