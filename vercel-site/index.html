<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botu Ekle — Discord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --discord: #5865f2;
            --discord-hover: #4752c4;
            --bg: #08080c;
            --bg-soft: #0c0c12;
            --surface: rgba(255,255,255,0.04);
            --surface-border: rgba(255,255,255,0.06);
            --accent: #22d3ee;
            --glow: rgba(88, 101, 242, 0.25);
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #f4f4f5;
            background: var(--bg);
        }
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 140% 100% at 50% -20%, rgba(15, 23, 42, 0.9) 0%, transparent 55%),
                radial-gradient(ellipse 80% 50% at 100% 50%, rgba(34, 211, 238, 0.06) 0%, transparent 45%),
                radial-gradient(ellipse 60% 80% at 0% 80%, rgba(88, 101, 242, 0.05) 0%, transparent 45%),
                linear-gradient(180deg, #08080c 0%, #0a0a10 30%, #07070b 100%);
        }
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 2;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 72px 72px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 15%, transparent 65%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 15%, transparent 65%);
        }
        .glow {
            position: fixed;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            pointer-events: none;
            z-index: 3;
        }
        .glow-1 { top: -120px; right: -80px; background: var(--accent); }
        .glow-2 { bottom: -100px; left: -80px; background: var(--discord); }
        .wrap {
            position: relative;
            z-index: 10;
            max-width: 820px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            max-width: 820px;
            margin: 0 auto;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-weight: 700;
            font-size: 1.35rem;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.03em;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--discord) 0%, #4346a8 100%);
            box-shadow: 0 0 28px rgba(88, 101, 242, 0.4), inset 0 1px 0 rgba(255,255,255,0.12);
        }
        nav a {
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.55rem 1.1rem;
            border-radius: 999px;
            border: 1px solid var(--surface-border);
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }
        nav a:hover { color: #fff; background: var(--surface); border-color: rgba(255,255,255,0.1); }
        .hero { margin-top: 0.5rem; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.4rem 1rem;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 1.75rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
        h1 {
            font-size: clamp(2.4rem, 6vw, 3.75rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 0.9rem;
            color: #fff;
            letter-spacing: -0.04em;
        }
        h1 .highlight {
            background: linear-gradient(135deg, #a5b4fc 0%, var(--discord) 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .desc {
            font-size: 1.1rem;
            line-height: 1.7;
            color: rgba(255,255,255,0.6);
            max-width: 460px;
            margin: 0 auto 2.25rem;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .feature-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1rem;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
        }
        .feature-pill svg { width: 17px; height: 17px; opacity: 0.85; color: var(--accent); }
        .cta { display: flex; flex-wrap: wrap; gap: 0.9rem; justify-content: center; align-items: center; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1rem 1.85rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.35);
        }
        .btn-primary {
            background: var(--discord);
            color: #fff;
            box-shadow: 0 4px 24px var(--glow), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .btn-primary:hover {
            filter: brightness(1.08);
            box-shadow: 0 8px 32px var(--glow);
        }
        .btn-primary svg { width: 22px; height: 22px; }
        .btn-secondary {
            background: var(--surface);
            color: #fff;
            border: 1px solid var(--surface-border);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.12);
        }
        .btn-secondary svg { width: 18px; height: 18px; }
        .maker-box {
            margin-top: 2.75rem;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 1.15rem;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .maker-box:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            color: #fff;
        }
        .maker-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .maker-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--accent);
        }
        .maker-box .göz-at {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }
        .maker-box:hover .göz-at { color: var(--accent); }
        .maker-box .göz-at svg { width: 14px; height: 14px; }
        .corner-dot {
            position: fixed;
            bottom: 0.9rem;
            left: 0.9rem;
            z-index: 100;
        }
        .corner-dot a {
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }
        .corner-dot a:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="noise"></div>
    <div class="grid-bg"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="wrap">
        <header>
            <a href="#" class="logo"><span class="logo-icon"></span>Bot</a>
            <nav><a href="https://discord.gg/norvec" target="_blank" rel="noopener">Destek Sunucusu</a></nav>
        </header>
        <section class="hero">
            <div class="badge"><span class="badge-dot"></span> Discord · DM & Grup</div>
            <h1>Hesabını bir üst<br><span class="highlight">seviyeye taşı.</span></h1>
            <p class="desc">DM ve gruplarda mesaj, görsel ve dosya paylaşımı. Hesabına ekle, slash komutlarla anında kullan.</p>
            <div class="features">
                <span class="feature-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Mesaj & Görsel
                </span>
                <span class="feature-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Slash komutlar
                </span>
                <span class="feature-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Güvenli
                </span>
            </div>
            <div class="cta">
                <a href="https://discord.com/oauth2/authorize?client_id=1477691544462164129&integration_type=1&scope=applications.commands" id="btn-discord-add" class="btn btn-primary" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                    Discord'a Ekle
                </a>
                <a href="https://discord.gg/norvec" class="btn btn-secondary" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    Destek Sunucusu
                </a>
            </div>
            <a href="https://guns.lol/frezzgod" class="maker-box" target="_blank" rel="noopener">
                <div style="text-align: left;">
                    <div class="maker-label">Bot yapımcısı</div>
                    <div class="maker-name">@frezzgodd_</div>
                </div>
                <span class="göz-at">Göz at <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
            </a>
        </section>
    </div>
    <div class="corner-dot"><a href="/log" aria-hidden="true"></a></div>
    <script>
        (function() {
            function sendLog(type) { try { fetch('/api/log?type=' + encodeURIComponent(type), { method: 'GET', mode: 'same-origin' }).catch(function(){}); } catch (e) {} }
            sendLog('visit');
            var btn = document.getElementById('btn-discord-add');
            if (btn) btn.addEventListener('click', function() { sendLog('click'); });
        })();
    </script>
</body>
</html>
