<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botu Ekle — Discord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            background: #000;
        }
        /* Arka plan: siyah dark tema */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 100% 60% at 50% -10%, #0d0d0d 0%, transparent 50%),
                        radial-gradient(ellipse 80% 50% at 50% 50%, #050505 0%, transparent 70%),
                        linear-gradient(180deg, #000 0%, #0a0a0a 50%, #000 100%);
        }
        .stars {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.35), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(255,255,255,0.45), transparent),
                radial-gradient(2px 2px at 80% 50%, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 15% 80%, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90% 15%, rgba(255,255,255,0.25), transparent);
            background-size: 200% 200%;
            animation: twinkle 8s ease-in-out infinite;
            opacity: 0.8;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.5; }
        }
        .planet {
            position: fixed;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: min(420px, 80vw);
            height: min(420px, 80vw);
            border-radius: 50%;
            z-index: 2;
            background: radial-gradient(circle at 35% 35%, #2a2a35, #1a1a22 50%, #0c0c10);
            box-shadow: 
                inset -20px -20px 40px rgba(0,0,0,0.6),
                inset 10px 10px 25px rgba(255,255,255,0.04),
                0 0 60px rgba(0,0,0,0.5);
        }
        .clouds {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 180px;
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
            pointer-events: none;
        }
        .clouds::before,
        .clouds::after {
            content: '';
            position: absolute;
            bottom: 0;
            height: 120px;
            border-radius: 50%;
            background: rgba(20,20,25,0.5);
            filter: blur(25px);
        }
        .clouds::before {
            left: -10%;
            width: 50%;
        }
        .clouds::after {
            right: -10%;
            width: 45%;
        }
        .wrap {
            position: relative;
            z-index: 10;
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        /* Header */
        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            max-width: 720px;
            margin: 0 auto;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.35rem;
            color: #fff;
            text-decoration: none;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5865f2, #7289da);
            box-shadow: 0 0 12px rgba(88, 101, 242, 0.5);
        }
        nav a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
        }
        nav a:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        /* Hero */
        .hero {
            margin-top: 2rem;
        }
        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        h1 .highlight {
            background: linear-gradient(135deg, #5865f2, #7289da);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
            max-width: 480px;
            margin: 0 auto 2.5rem;
        }
        .cta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1rem 1.75rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: #5865f2;
            color: #fff;
            box-shadow: 0 4px 16px rgba(88, 101, 242, 0.4);
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 24px rgba(88, 101, 242, 0.5);
        }
        .btn-primary svg {
            width: 22px;
            height: 22px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.3);
        }
        .btn-secondary svg {
            width: 20px;
            height: 20px;
        }
        /* Bot yapımcısı — Göz at kutusu */
        .maker-box {
            margin-top: 2.5rem;
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }
        .maker-box:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-1px);
            color: #fff;
        }
        .maker-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .maker-name {
            font-size: 1rem;
            font-weight: 600;
        }
        .maker-box .göz-at {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #5865f2;
        }
        .maker-box .göz-at svg {
            width: 16px;
            height: 16px;
        }
        /* Sol alt log girişi — sadece sen */
        .log-entry {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            z-index: 100;
        }
        .log-entry a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .log-entry a:hover {
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="stars"></div>
    <div class="planet"></div>
    <div class="clouds"></div>

    <div class="wrap">
        <header>
            <a href="#" class="logo">
                <span class="logo-icon"></span>
                Bot
            </a>
            <nav>
                <a href="https://discord.gg/norvec" target="_blank" rel="noopener">Destek Sunucusu</a>
            </nav>
        </header>

        <section class="hero">
            <h1>Hesabını bir üst<br><span class="highlight">seviyeye taşı.</span></h1>
            <p class="desc">
                DM ve gruplarda mesaj, görsel ve dosya paylaşımı. Hesabına ekle, slash komutlarla anında kullan.
            </p>
            <div class="cta">
                <a href="https://discord.com/oauth2/authorize?client_id=1477691544462164129&integration_type=1&scope=applications.commands" 
                   id="btn-discord-add"
                   class="btn btn-primary" 
                   target="_blank" 
                   rel="noopener">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                    Discord'a Ekle
                </a>
                <a href="https://discord.gg/norvec" 
                   class="btn btn-secondary" 
                   target="_blank" 
                   rel="noopener">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    Destek Sunucusu
                </a>
            </div>
            <a href="https://guns.lol/frezzgod" class="maker-box" target="_blank" rel="noopener">
                <div style="text-align: left;">
                    <div class="maker-label">Bot yapımcısı</div>
                    <div class="maker-name">frezzgod</div>
                </div>
                <span class="göz-at">
                    Göz at
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </span>
            </a>
        </section>
    </div>
    <div class="log-entry">
        <a href="/log" title="Log">×</a>
    </div>
    <script>
        (function() {
            var discordLink = 'https://discord.com/oauth2/authorize?client_id=1477691544462164129&integration_type=1&scope=applications.commands';
            function sendLog(type) {
                try {
                    fetch('/api/log?type=' + encodeURIComponent(type), { method: 'GET', mode: 'same-origin' }).catch(function(){});
                } catch (e) {}
            }
            sendLog('visit');
            var btn = document.getElementById('btn-discord-add');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    sendLog('click');
                });
            }
        })();
    </script>
</body>
</html>
